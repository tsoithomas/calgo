execution_mode: simulation

data_sources:
  - source: alpaca
    api_key: your_alpaca_api_key_here
    priority: 1
  - source: yahoo_finance
    api_key: not_required_for_yahoo
    priority: 2

risk_parameters:
  stop_loss_pct: 0.05
  take_profit_pct: 0.10
  max_position_size_pct: 0.20
  max_drawdown_pct: 0.15
  max_portfolio_value: 100000.00

active_models:
  - model_id: ma_crossover_v1
    model_type: moving_average
    parameters:
      short_window: 20
      long_window: 50
    enabled: true

trading_schedule:
  market_open: "09:30"
  market_close: "16:00"
  data_fetch_interval_seconds: 300
  trading_days:
    - MON
    - TUE
    - WED
    - THU
    - FRI

broker_config:
  broker_name: alpaca
  api_key: your_broker_api_key_here
  api_secret: your_broker_api_secret_here
  base_url: https://paper-api.alpaca.markets

logging_config:
  log_directory: ./logs
  log_level: INFO
  rotation_policy: daily
